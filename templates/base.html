<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Iniwa's Twitch BOT{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/common.css') }}">
    {% block extra_css %}{% endblock %}
    {% block extra_head %}{% endblock %}
</head>
<body class="layout-b">

    <div id="top-bar">
        <a href="/" class="brand">🎮 Twitch BOT</a>
        <div class="nav-links">
            <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">📊 ダッシュボード</a>
            <a href="/analytics" class="nav-link {% if '/analytics' in request.path %}active{% endif %}">📈 アナリティクス</a>
        </div>
        <div class="spacer"></div>
        <div class="status-area">
            <span id="live-badge" class="live-off">●OFF</span>
            <span id="top-game"></span>
            <span id="top-viewers">👁 0</span>
        </div>
        <button id="layout-toggle" onclick="toggleLayout()">B</button>
    </div>

    <nav id="sidebar">
        <a href="/" {% if request.path == '/' %}style="color:var(--accent);"{% endif %}>📊 ダッシュボード</a>
        <a href="/analytics" {% if '/analytics' in request.path %}style="color:var(--accent);"{% endif %}>📈 アナリティクス</a>
    </nav>

    <div id="toast-container"></div>

    {% block content %}{% endblock %}

    <script src="{{ url_for('static', filename='js/common.js') }}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
