<div class="card" data-card="viewers">
    <div id="viewer-upper" style="display:flex; flex-direction:column; overflow:hidden; flex:var(--viewer-upper-flex, 1);">
        <h2 style="flex-direction:column; align-items:stretch; gap:6px;">
            <div>📊 視聴者リスト <span id="viewer-count-span" style="font-size:0.8em; color:var(--text-secondary);">({{ active_viewers|length }}人)</span></div>
            <div class="viewer-action-btns">
                <button class="btn btn-purple" onclick="toggleModal('followerModal')">👥 フォロワー</button>
                <button class="btn btn-info" onclick="toggleModal('historyModal')">📜 履歴</button>
            </div>
        </h2>

        <div class="card-scroll-area">
            <table class="viewer-table">
                <thead>
                    <tr>
                        <th>名前</th>
                        <th>フォロー</th>
                        <th>滞在</th>
                        <th>回数</th>
                        <th>メモ</th>
                        <th>SO</th>
                    </tr>
                </thead>
                <tbody id="viewer-tbody">
                    {% for viewer in active_viewers %}
                    <tr>
                        <td><b>{{ viewer.name }}</b></td>
                        <td>{% if viewer.is_follower %}<span class="follow-status">✅</span> <span style="font-size:0.75em; color:#888;">{{ viewer.followed_at }}</span>{% else %}-{% endif %}</td>
                        <td>{{ viewer.duration }}</td>
                        <td>{{ viewer.total }}回</td>
                        <td>
                            <button class="btn-memo" title="{{ viewer.memo }}" data-action="open-memo" data-uid="{{ viewer.uid }}" data-name="{{ viewer.name }}" data-memo="{{ viewer.memo|default('') }}">📝</button>
                        </td>
                        <td>
                            <button class="btn-so" data-action="shoutout" data-login="{{ viewer.login }}" data-name="{{ viewer.name }}">SO</button>
                        </td>
                    </tr>
                    {% else %}
                    <tr><td colspan="6" style="text-align:center; color:var(--text-secondary);">現在なし / オフライン</td></tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>

        <form action="/shoutout" method="post" class="so-form">
            <input type="text" name="target_name" placeholder="英語IDを入力 (例: iniwa)" required style="flex:1;">
            <button class="btn btn-apply" style="padding:6px 15px; font-size:0.8em;">📣 紹介</button>
        </form>
    </div>

    <div class="resize-handle-h" id="resize-viewer-v"></div>

    <div id="event-lower" style="display:flex; flex-direction:column; overflow:hidden; flex:var(--viewer-lower-flex, 0.6);">
        <div class="event-panel-header">
            <span>📢 イベント</span>
            <span id="event-count-badge" class="event-count-badge" style="display:none;">0</span>
        </div>
        <div class="card-scroll-area" id="event-feed">
            <div style="text-align:center; color:var(--text-secondary); padding:20px; font-size:0.85em;">イベント待機中...</div>
        </div>
    </div>
</div>
