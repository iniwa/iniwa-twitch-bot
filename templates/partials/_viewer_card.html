<div class="card" data-card="viewers">
    <h2 style="flex-direction:column; align-items:stretch; gap:6px;">
        <div>📊 視聴者リスト <span id="viewer-count-span" style="font-size:0.8em; color:var(--text-secondary);">({{ active_viewers|length }}人)</span></div>
        <div class="viewer-action-btns">
            <a href="/analytics" class="btn btn-analytics">📈 アナリティクス</a>
            <button class="btn btn-purple" onclick="toggleModal('followerModal')">👥 フォロワー</button>
            <button class="btn btn-info" onclick="toggleModal('historyModal')">📜 履歴</button>
        </div>
    </h2>

    <div class="card-scroll-area">
        <table class="viewer-table">
            <thead>
                <tr>
                    <th>名前</th>
                    <th>フォロー</th>
                    <th>滞在</th>
                    <th>回数</th>
                    <th>メモ</th>
                    <th>SO</th>
                </tr>
            </thead>
            <tbody id="viewer-tbody">
                {% for viewer in active_viewers %}
                <tr>
                    <td><b>{{ viewer.name }}</b></td>
                    <td>{{ viewer.follow_status|safe }}</td>
                    <td>{{ viewer.duration }}</td>
                    <td>{{ viewer.total }}回</td>
                    <td>
                        <button class="btn-memo" title="{{ viewer.memo }}" onclick="openMemoModal('{{ viewer.uid }}', '{{ viewer.name }}', '{{ viewer.memo|replace("'", "\\'") }}')">📝</button>
                    </td>
                    <td>
                        <button class="btn-so" onclick="shoutout('{{ viewer.login }}', '{{ viewer.name }}')">SO</button>
                    </td>
                </tr>
                {% else %}
                <tr><td colspan="6" style="text-align:center; color:var(--text-secondary);">現在なし / オフライン</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <form action="/shoutout" method="post" class="so-form">
        <input type="text" name="target_name" placeholder="英語IDを入力 (例: iniwa)" required style="flex:1;">
        <button class="btn btn-apply" style="padding:6px 15px; font-size:0.8em;">📣 紹介</button>
    </form>
</div>
